
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="vite.svg" />
    
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="vite.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GuaraFood">

    <!-- viewport-fit=cover é essencial para o rastreador não ficar embaixo da barra do iPhone -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <meta name="theme-color" content="#ea580c" />
    
    <title>GuaraFood - Delivery da Cidade</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }

      @keyframes pulse-logo {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.9; }
        100% { transform: scale(1); opacity: 1; }
      }
      
      .splash-logo {
        animation: pulse-logo 2s infinite ease-in-out;
      }

      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #ea580c;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        color: white;
        font-family: sans-serif;
        transition: opacity 0.5s ease-out, visibility 0.5s;
        pointer-events: auto;
      }

      #splash-screen.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Ajuste de padding para iPhones com barra inferior */
      .pb-safe {
        padding-bottom: var(--sab);
      }

      @media print {
        body * { visibility: hidden; }
        /* Adicionado #thermal-report-closing para permitir impressão do fechamento */
        #printable-order, #printable-order *, #thermal-report-closing, #thermal-report-closing * { visibility: visible; }
        #printable-order, #thermal-report-closing { position: absolute; left: 0; top: 0; width: 100%; }
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-gray-50">
    <div id="root">
        <div id="splash-screen">
            <div class="splash-logo" style="display: flex; flex-direction: column; align-items: center;">
                <svg width="80" height="80" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="white">
                    <path d="M21 13H3c-1.103 0-2 .897-2 2v2c0 1.103.897 2 2 2h18c1.103 0 2-.897 2-2v-2c0-1.103-.897-2-2-2zM1 9V7c0-1.103.897-2 2-2h2v4H3c-1.103 0-2 .897-2 2v2h4V9H1zM19 5h2c1.103 0 2 .897 2 2v2h-4V5zM11 5h2v4h-2V5zm-4 0h2v4H7V5z"/>
                    <path d="M12 2c-4.963 0-9 4.037-9 9 0 4.148 3.037 7.6 7 8.722V21h4v-1.278c3.963-1.122 7-4.574 7-8.722 0-4.963-4.037-9-9-9zm0 16a7 7 0 1 1 0-14 7 7 0 0 1 0 14z"/>
                </svg>
                <h1 style="font-size: 2rem; font-weight: 800; margin-top: 1rem; letter-spacing: 0.05em;">GuaraFood</h1>
                <p style="margin-top: 1rem; font-size: 0.8rem; opacity: 0.8;">Carregando sua fome...</p>
            </div>
        </div>
    </div>
    <script>
      // CONFIGURAÇÃO DE VERSÃO PARA LIMPEZA AUTOMÁTICA
      const APP_VERSION = "1.1.2"; 
      window.reactAppMounted = false;
      
      (function() {
        try {
          const lastVersion = localStorage.getItem('guarafood_app_version');
          
          // Se a versão mudou, limpamos caches e service workers AGRESSIVAMENTE
          if (lastVersion !== APP_VERSION) {
            console.log('Nova versão detectada (' + APP_VERSION + '). Limpando caches...');
            
            // 1. Unregister Service Workers
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) { registration.unregister(); }
              });
            }
            
            // 2. Clear Cache Storage
            if ('caches' in window) {
              caches.keys().then(function(names) {
                for (let name of names) caches.delete(name);
              });
            }

            // 3. Marcar versão atualizada
            localStorage.setItem('guarafood_app_version', APP_VERSION);
            
            // Forçar reload limpo apenas UMA vez para aplicar mudanças
            if (!sessionStorage.getItem('version_cleaned')) {
              sessionStorage.setItem('version_cleaned', 'true');
              window.location.reload(true);
              return;
            }
          }
        } catch (e) {
          console.error('Erro na limpeza de cache:', e);
        }
      })();

      // RECUPERAÇÃO AUTOMÁTICA SE TRAVAR NO CARREGAMENTO
      window.addEventListener('load', function() {
        // Se após 12 segundos o aplicativo React ainda não estiver montado, executa o auto-reparo seguro
        setTimeout(function() {
          if (!window.reactAppMounted) {
            console.warn('O sistema parece estar travado no carregamento. Executando auto-reparo seguro...');
            
            try {
              // Limpeza cirúrgica de emergência:
              // Preservamos o login do usuário, chaves do Supabase e as configurações de impressora do restaurante
              const keysToKeep = [
                'guara-food-user-profile-v3', 
                'guarafood-notifications-enabled', 
                'guarafood-printer-width', 
                'guarafood-is-print-server', 
                'guarafood-panel-locked',
                'guarafood_app_version'
              ];
              
              for (let i = localStorage.length - 1; i >= 0; i--) {
                const key = localStorage.key(i);
                if (key) {
                  const isSupabaseAuth = key.startsWith('sb-');
                  const isCrucialConfig = keysToKeep.some(function(k) { return key === k; });
                  if (!isSupabaseAuth && !isCrucialConfig) {
                    localStorage.removeItem(key);
                  }
                }
              }
              sessionStorage.clear();
            } catch (err) {
              console.error('Erro na limpeza cirúrgica de localStorage:', err);
            }
            
            if ('caches' in window) {
              caches.keys().then(function(names) {
                for (let name of names) caches.delete(name);
              });
            }
            
            // Redireciona com query string para ignorar cache de borda/proxy
            window.location.href = window.location.pathname + '?repair=' + new Date().getTime();
          }
        }, 12000);
      });

      function hideSplash() {
        const splash = document.getElementById('splash-screen');
        if (splash) {
          splash.classList.add('hidden');
          splash.style.pointerEvents = 'none';
        }
      }

      // GARANTIA DE SAÍDA (Failsafe): some com a tela de carregamento após 4 segundos sob qualquer circunstância
      setTimeout(hideSplash, 4000);
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
